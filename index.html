<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Commit</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen">
      <h1 class="title">What will you commit to right now?</h1>

      <!-- Suggested tasks -->
      <div class="suggestions">
        <button id="task1" class="task-btn" onclick="selectTask(0)">
          Study (10 min)
        </button>
        <button id="task2" class="task-btn" onclick="selectTask(1)">
          Clean your desk (10 min)
        </button>
        <button id="task3" class="task-btn" onclick="selectTask(2)">
          Walk (5 min)
        </button>
      </div>

      <!-- Shuffle button -->
      <button id="shuffle-btn" class="secondary-btn" onclick="shuffleTasks()">
        Shuffle suggestions
      </button>

      <!-- Custom task -->
      <div class="custom-task">
        <h3>Custom task</h3>

        <input type="text" id="custom-task-name" placeholder="Task name" />

        <input
          type="number"
          id="custom-task-time"
          placeholder="Minutes"
          min="1"
        />

        <button class="task-btn" onclick="createCustomTask()">
          Start custom task
        </button>
      </div>

      <!-- Hidden initially, revealed after shuffle threshold -->
      <button
        id="too-tired-btn"
        class="secondary-btn hidden"
        onclick="showEasyMode()"
      >
        Too tired?
      </button>
    </div>

    <!-- HOLD TO COMMIT SCREEN -->
    <div id="hold-screen" class="screen hidden">
      <!-- Task info -->
      <div class="hold-header">
        <h1 id="hold-task-name">Task Name</h1>
        <p id="hold-task-time">10 minutes</p>

        <!-- Instruction -->
        <div class="hold-instruction">
          <h2>Hold to Commit</h2>
          <p>Stay pressed until the circle fills</p>
        </div>

        <!-- Main interaction zone -->
        <div id="hold-area" class="hold-area">
          <!-- Progress indicator (visual feedback) -->
          <div class="progress-container">
            <svg
              class="progress-ring"
              width="160"
              height="160"
              viewBox="0 0 160 160"
            >
              <circle class="progress-ring-bg" cx="80" cy="80" r="70"></circle>

              <circle
                id="progress-circle"
                class="progress-ring-fill"
                cx="80"
                cy="80"
                r="70"
              ></circle>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- TIMER SCREEN -->
    <div id="timer-screen" class="screen hidden">
      <!-- Task title -->
      <h1 id="timer-task-name">Task Name</h1>

      <!-- Timer display -->
      <div class="timer-display">
        <h2 id="timer-countdown">10:00</h2>
      </div>

      <!-- Status text -->
      <p id="timer-status">Stay focused.</p>

      <!-- Optional progress bar (simple fallback visual) -->
      <div class="timer-bar-container">
        <div id="timer-bar" class="timer-bar"></div>
      </div>

      <div class="timer-controls">
        <button id="pause-btn" onclick="toggleTimer()">Pause</button>

        <button id="quit-btn" class="hidden" onclick="quitToHome()">
          Quit
        </button>

        <p id="pause-message" class="hidden">
          Don’t quit now. Small steps still count.
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
